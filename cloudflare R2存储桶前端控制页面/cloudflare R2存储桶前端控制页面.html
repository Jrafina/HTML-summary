<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>☁️ R2 多账户 · 本地缓存搜索 · 大文件上传 · 预览编辑增强</title>
    <!-- 原有依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1591.0/aws-sdk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7.1.1/build/umd.js"></script>
    <!-- 预览/编辑依赖 (纯前端) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <!-- Font Awesome 图标库 (用于增强预览) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown 渲染与高亮 (增强版) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <!-- 行号插件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
    <!-- GitHub Markdown 样式 (增强预览) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css">
    <style>
        /* 原有样式完全保持不变，仅新增容量指示器相关样式 */
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8; min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 24px; margin: 0; color: #1e293b;
        }
        .glass-panel {
            max-width: 1600px; width: 100%; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px); border-radius: 32px;
            box-shadow: 0 20px 40px -8px rgba(0,0,0,0.12); border: 1px solid rgba(255,255,255,0.6);
            overflow: hidden; transition: all 0.2s;
        }
        .app-header {
            padding: 20px 28px; background: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(203,213,225,0.4); display: flex; align-items: center; gap: 12px;
            flex-wrap: wrap;
        }
        .app-header h1 {
            font-size: 1.8rem; font-weight: 600; letter-spacing: -0.02em;
            background: linear-gradient(145deg, #0f2b3d, #1e4a6b);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .badge {
            background: #dbeafe; color: #1e4a7a; font-size: 0.75rem; font-weight: 500;
            padding: 4px 10px; border-radius: 40px; margin-left: 12px; white-space: nowrap;
        }
        .header-actions { margin-left: auto; display: flex; gap: 8px; }
        
        .account-bar {
            padding: 12px 28px; background: rgba(255,255,255,0.3); border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .account-selector {
            display: flex; align-items: center; gap: 8px; background: white; padding: 4px 10px 4px 18px;
            border-radius: 60px; border: 1.5px solid #dee6ed;
        }
        .account-selector select {
            border: none; outline: none; font-size: 0.95rem; padding: 8px 4px; min-width: 220px;
            background: transparent; font-weight: 500;
        }
        .account-actions { display: flex; gap: 6px; }
        .mini-btn {
            background: white; border: 1px solid #cbd5e1; border-radius: 30px; padding: 6px 14px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap;
        }
        .mini-btn.primary { background: #1e3a5f; color: white; border-color: #1e3a5f; }
        .mini-btn.warning { background: #fef9c3; border-color: #eab308; color: #854d0e; }
        
        .config-section { padding: 16px 28px 12px; transition: all 0.2s; }
        .config-section.collapsed { display: none; }
        .config-grid { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px 20px; }
        .input-pill { display: flex; flex-direction: column; min-width: 170px; }
        .input-pill label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #5b6f84; margin-bottom: 4px; margin-left: 6px; }
        .input-pill input, .input-pill select {
            background: white; border: 1.5px solid #e2e8f0; border-radius: 40px;
            padding: 10px 18px; font-size: 0.9rem; outline: none; font-family: inherit;
        }
        .input-pill input:focus, .input-pill select:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
        .btn-primary {
            background: #1e3a5f; border: none; color: white; font-weight: 600;
            padding: 10px 24px; border-radius: 60px; font-size: 0.9rem; cursor: pointer;
            box-shadow: 0 6px 12px -6px #15325033; border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        .btn-primary:hover { background: #0f2b40; transform: translateY(-1px); }
        .btn-outline {
            background: rgba(255,255,255,0.7); border: 1.5px solid #cbd5e1; color: #1e293b;
            font-weight: 500; padding: 8px 18px; border-radius: 60px; font-size: 0.85rem; cursor: pointer;
            white-space: nowrap;
        }
        .nav-toolbar {
            padding: 8px 28px; display: flex; align-items: center; gap: 16px;
            border-bottom: 1px solid #e9eef3; background: rgba(255,255,255,0.4); flex-wrap: wrap;
        }
        .breadcrumb-path {
            background: white; padding: 6px 18px; border-radius: 40px; font-size: 0.9rem;
            font-family: monospace; color: #0b3b5c; border: 1px solid #dee6ed; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .search-wrapper {
            display: flex; align-items: center; background: white; padding: 2px 2px 2px 18px;
            border-radius: 60px; border: 1.5px solid #dee6ed; gap: 4px;
        }
        .search-wrapper input { border: none; outline: none; font-size: 0.9rem; padding: 8px 0; width: 200px; background: transparent; min-width: 120px; }
        .search-wrapper button {
            background: #eef4ff; border: none; border-radius: 60px; padding: 8px 16px;
            font-weight: 500; color: #1e4a7a; cursor: pointer; white-space: nowrap;
        }
        .cache-badge {
            background: #e6f7e6; padding: 4px 16px; border-radius: 60px; font-size: 0.8rem;
            border: 1px solid #22c55e; color: #166534;
        }
        .action-group {
            padding: 16px 28px 8px; display: flex; flex-wrap: wrap; gap: 10px;
            border-bottom: 1px solid rgba(203,213,225,0.3);
        }
        .action-btn {
            background: white; border: 1px solid #dde3ea; border-radius: 40px; padding: 8px 18px;
            font-size: 0.85rem; font-weight:500; color: #254358; cursor: pointer; white-space: nowrap;
        }
        .action-btn.danger { color: #b91c1c; border-color: #fecaca; background: #fff8f8; }
        .file-list-container { 
            padding: 12px 20px 20px; max-height: 55vh; overflow-y: auto; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        .file-row {
            display: flex; align-items: center; padding: 12px 16px; margin: 2px 0;
            background: rgba(255,255,255,0.5); border-radius: 20px; border: 1px solid transparent;
            min-width: fit-content;
        }
        .file-row:hover { background: white; border-color: #cbdff5; }
        .file-list-header {
            display: flex; padding: 8px 16px; font-weight: 600; font-size: 0.75rem;
            text-transform: uppercase; color: #52718c; border-bottom: 1.5px solid #d7e1ea;
            min-width: fit-content;
        }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #1e4a7a; margin-right: 12px; flex-shrink: 0; }
        .progress-panel { margin: 6px 28px 16px; background: #ecf3fa; border-radius: 60px; padding: 12px 22px; }
        progress { width: 100%; height: 12px; border-radius: 20px; }
        .status-footer {
            padding: 12px 28px; background: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(203,213,225,0.4); font-size: 0.8rem;
        }
        .context-menu { 
            position: fixed; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); 
            border-radius: 24px; padding: 8px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); 
            border: 1px solid rgba(255,255,255,0.8); z-index: 9999; min-width: 160px;
        }
        .context-menu div { padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 500; }
        .context-menu div:hover { background: #eef2ff; }
        .account-tag {
            background: #e6edf5; border-radius: 20px; padding: 2px 10px; font-size: 0.7rem;
            color: #1e4a7a; margin-left: 8px; font-weight: 500;
        }
        .file-path-hint { font-size: 0.75rem; color: #6f8fae; margin-left: 8px; font-family: monospace; }

        /* 模态框 & Markdown 增强样式 (融合 Editor_HtmlAndMarkdown 风格) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-card {
            background: white; border-radius: 32px; box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            width: 90vw; max-width: 1200px; max-height: 85vh; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5); overflow: hidden;
        }
        .modal-header {
            padding: 18px 24px; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between;
            background: #fafcff;
        }
        .modal-title { font-weight: 700; font-size: 1.3rem; color: #0f2b3d; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #62748c; }
        .modal-body { padding: 20px 24px; overflow: auto; flex:1; background: #fbfdff; }
        .editor-toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
        .editor-textarea { width: 100%; min-height: 300px; font-family: 'Monaco', monospace; padding: 16px; border-radius: 20px; border: 1.5px solid #dde3ea; }
        .preview-container img { max-width: 100%; border-radius: 16px; }
        .preview-frame { width: 100%; height: 70vh; border: none; border-radius: 20px; }
        .xlsx-table { overflow-x: auto; background: white; border-radius: 20px; padding: 12px; }
        .xlsx-table table { border-collapse: collapse; width: 100%; }
        .xlsx-table td, .xlsx-table th { border: 1px solid #ccc; padding: 8px; }

        /* Markdown 预览增强 (参考编辑器样式) */
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: white; padding: 24px; border-radius: 20px; color: #1e293b;
        }
        .dark-markdown .markdown-body { background: #1d2a35; color: #c9d1d9; }
        .code-block-container {
            margin: 16px 0; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .code-block-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 16px; background: #eef2f6; border-bottom: 1px solid #dde3ea;
        }
        .code-language {
            display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
            font-weight: 600; color: #334155;
        }
        .code-language i { font-size: 1rem; }
        .lang-name {
            background: #cbd5e1; padding: 2px 8px; border-radius: 20px;
            color: #0f172a; text-transform: uppercase;
        }
        .code-actions { display: flex; gap: 8px; }
        .code-action-btn {
            background: none; border: none; font-size: 0.75rem; cursor: pointer;
            color: #475569; padding: 4px 8px; border-radius: 20px; font-weight: 500;
        }
        .code-action-btn:hover { background: #cbd5e1; }
        .code-content { padding: 16px; overflow-x: auto; background: #ffffff; }
        .code-content pre { margin: 0; }
        .hljs { background: transparent !important; padding: 0; }
        .hljs-ln { border-collapse: collapse; }
        .hljs-ln td { padding: 0; }
        .hljs-ln-numbers {
            text-align: right; color: #94a3b8; padding-right: 12px !important;
            user-select: none; border-right: 1px solid #cbd5e1;
        }
        .hljs-ln-code { padding-left: 12px !important; }

        /* 新增: 与参考编辑器一致的图标微调 */
        .code-block-header .fa-code, .code-block-header .fa-copy { margin-right: 4px; }

        /* ===== 新增：容量指示器样式（完全不影响原有样式） ===== */
        .capacity-indicator {
            display: flex; align-items: center; gap: 8px; margin-left: auto;
            background: rgba(255,255,255,0.5); padding: 4px 12px 4px 8px;
            border-radius: 40px; border: 1px solid #cbd5e1; font-size: 0.8rem;
            white-space: nowrap;
        }
        .capacity-bar-bg {
            width: 90px; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden;
        }
        .capacity-bar-fill {
            height: 100%; width: 0%; background: #22c55e; border-radius: 10px; transition: width 0.2s, background 0.2s;
        }
        /* ===== 新增样式结束 ===== */

        @media screen and (max-width: 768px) {
            body { padding: 12px; }
            .glass-panel { border-radius: 24px; }
            .app-header { padding: 16px 18px; }
            .account-bar { padding: 12px 16px; flex-direction: column; align-items: stretch; }
            .account-selector { width: 100%; }
            .account-selector select { width: 100%; }
            .config-grid { flex-direction: column; align-items: stretch; }
            .input-pill { min-width: 100%; }
            .btn-primary, .btn-outline { width: 100%; justify-content: center; }
            .nav-toolbar { flex-direction: column; align-items: stretch; }
            .search-wrapper { width: 100%; }
            .search-wrapper input { width: 100%; }
            .action-btn { flex: 1 0 calc(50% - 8px); }
            .file-list-header, .file-row { min-width: 700px; }
            .capacity-indicator { margin-left: 0; width: 100%; justify-content: center; }
        }
        button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
<div class="glass-panel">
    <div class="app-header">
        <h1><span>📦 R2 多账户 · 本地缓存</span><span class="badge">💾 搜索零LIST · 递归勾选 · MD增强预览</span></h1>
        <div class="header-actions">
            <button id="toggleConfigBtn" class="btn-outline" style="background:white;">⚙️ 隐藏配置</button>
        </div>
    </div>

    <div class="account-bar">
        <div class="account-selector">
            <span>🗂️ 当前账户</span>
            <select id="accountSelect"></select>
        </div>
        <div class="account-actions">
            <button id="addAccountBtn" class="mini-btn primary" title="基于当前表单添加新账户">➕ 添加</button>
            <button id="updateAccountBtn" class="mini-btn" title="用当前表单更新选中账户">✏️ 更新</button>
            <button id="deleteAccountBtn" class="mini-btn" title="删除选中账户">🗑️ 删除</button>
            <button id="connectAccountBtn" class="mini-btn primary" style="margin-left:6px;">🔌 连接</button>
        </div>
        <button id="syncCacheBtn" class="mini-btn warning" title="同步所有账户文件列表到本地缓存 (消耗LIST)">🔄 同步缓存</button>
        
        <!-- 新增：容量显示区域（位置在同步缓存按钮之后，cacheStatus之前） -->
        <div class="capacity-indicator" id="capacityIndicator">
            <i class="fas fa-database" style="opacity:0.7;"></i>
            <span id="capacityText">— / 10 GB</span>
            <div class="capacity-bar-bg">
                <div id="capacityBarFill" class="capacity-bar-fill" style="width:0%; background:#10b981;"></div>
            </div>
        </div>

        <span id="cacheStatus" style="margin-left:0; font-size:0.8rem;" class="cache-badge">📦 缓存就绪</span>
    </div>

    <div class="config-section" id="configSection">
        <div class="config-grid">
            <div class="input-pill"><label>账户名称</label><input type="text" id="accountName" placeholder="例如：生产环境"></div>
            <div class="input-pill"><label>账户 ID</label><input type="text" id="accountId" placeholder="账户ID"></div>
            <div class="input-pill"><label>Access Key</label><input type="text" id="accessKey"></div>
            <div class="input-pill"><label>Secret Key</label><input type="password" id="secretKey"></div>
            <div class="input-pill"><label>存储桶</label><input type="text" id="bucketName"></div>
            <div class="input-pill"><label>自定义域名</label><input type="text" id="customDomain" placeholder="https://..."></div>
            <div class="input-pill"><label>URL 模式</label><select id="urlMode"><option value="custom">自定义域名</option><option value="presigned">预签名URL</option></select></div>
            <div class="input-pill"><label>预签名(秒)</label><input type="number" id="expiresIn" value="3600"></div>
            <button id="cleanMultipartBtn" class="btn-outline">🧹 清理未完成上传</button>
        </div>
    </div>

    <div class="nav-toolbar">
        <button id="upBtn" class="btn-outline" disabled>⬆️ 上级目录</button>
        <span class="breadcrumb-path" id="currentPath">/</span>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="🔎 搜索文件名 (本地缓存)" autocomplete="off">
            <button id="searchBtn">搜索</button>
            <button id="clearSearchBtn" title="清除">✕</button>
        </div>
        <span id="searchModeIndicator" class="cache-badge">💾 本地缓存搜索 · 零LIST</span>
        <span id="searchResultHint" style="margin-left:auto; font-size:0.8rem;"></span>
    </div>

    <div class="action-group">
        <button id="selectAllBtn" class="action-btn">✅ 全部勾选</button>
        <button id="deselectAllBtn" class="action-btn">❌ 全部取消</button>
        <button id="exportCsvBtn" class="action-btn">📎 导出CSV (勾选项)</button>
        <button id="uploadFileBtn" class="action-btn">📤 上传文件</button>
        <button id="uploadFolderBtn" class="action-btn">📁 上传文件夹</button>
        <button id="downloadSelectedBtn" class="action-btn">⬇️ 下载选中</button>
        <button id="deleteSelectedBtn" class="action-btn danger">🗑️ 删除选中</button>
    </div>

    <div class="file-list-container" id="fileList">
        <div style="text-align:center; padding:48px 20px; color:#5b7a96;">☁️ 请先连接账户，并点击「同步缓存」</div>
    </div>

    <div class="progress-panel" id="progressArea" style="display: none;">
        <progress id="progressBar" value="0" max="100"></progress>
        <div id="progressText" style="margin-top:8px;"></div>
    </div>

    <div class="status-footer" id="statusBar">⚡ 就绪 · 搜索基于本地缓存(不消耗LIST) · 上传/删除后建议同步缓存</div>
</div>

<!-- 右键菜单 (增加预览/编辑入口) -->
<div id="contextMenu" class="context-menu" style="display:none;">
    <div id="copyUrlCtxBtn">📋 复制 URL (全部勾选)</div>
    <div id="downloadCtxBtn">⬇️ 下载 (全部勾选)</div>
    <hr>
    <div id="previewCtxBtn">👀 预览 (右键文件)</div>
    <div id="editCtxBtn">✏️ 编辑 (txt/md/docx)</div>
    <hr>
    <div id="deleteCtxBtn">🗑️ 删除 (全部勾选)</div>
</div>

<input type="file" id="hiddenFileInput" multiple style="display:none">
<input type="file" id="hiddenFolderInput" webkitdirectory multiple style="display:none">

<!-- 预览/编辑模态框 -->
<div id="previewEditModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">预览</span>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 配置 marked 和 highlight (增强预览) ----------
        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // 语言图标映射 (参考 Editor 风格)
        const languageIcons = {
            'javascript': 'fab fa-js-square',
            'js': 'fab fa-js-square',
            'html': 'fab fa-html5',
            'css': 'fab fa-css3-alt',
            'python': 'fab fa-python',
            'php': 'fab fa-php',
            'java': 'fab fa-java',
            'c': 'fas fa-c',
            'cpp': 'fas fa-c',
            'c++': 'fas fa-c',
            'c#': 'fas fa-c',
            'go': 'fab fa-golang',
            'rust': 'fas fa-gear',
            'ruby': 'fas fa-gem',
            'swift': 'fab fa-swift',
            'kotlin': 'fas fa-k',
            'typescript': 'fas fa-t',
            'ts': 'fas fa-t',
            'sql': 'fas fa-database',
            'bash': 'fas fa-terminal',
            'shell': 'fas fa-terminal',
            'json': 'fas fa-brackets-curly',
            'yaml': 'fas fa-file-code',
            'yml': 'fas fa-file-code',
            'markdown': 'fab fa-markdown',

        // ---------- IndexedDB 初始化 (完全保留) ----------
        let dbPromise;
        function initDB() {
            if (dbPromise) return dbPromise;
            dbPromise = idb.openDB('R2CacheDB', 1, {
                upgrade(db) {
                    if (!db.objectStoreNames.contains('objects')) {
                        const store = db.createObjectStore('objects', { keyPath: 'id' });
                        store.createIndex('byAccount', 'accountId');
                        store.createIndex('byBucket', 'bucket');
                    }
                    if (!db.objectStoreNames.contains('meta')) {
                        db.createObjectStore('meta');
                    }
                }
            });
            return dbPromise;
        }

        async function clearCacheForAccount(accountId) {
            const db = await initDB();
            const tx = db.transaction('objects', 'readwrite');
            const store = tx.objectStore('objects');
            const index = store.index('byAccount');
            let cursor = await index.openCursor(IDBKeyRange.only(accountId));
            while (cursor) {
                store.delete(cursor.primaryKey);
                cursor = await cursor.continue();
            }
            await tx.done;
        }

        async function storeObjectsBatch(accountId, bucket, objects) {
            const db = await initDB();
            const tx = db.transaction('objects', 'readwrite');
            const store = tx.objectStore('objects');
            for (const obj of objects) {
                const id = `${accountId}|${bucket}|${obj.Key}`;
                await store.put({ id, accountId, bucket, key: obj.Key, size: obj.Size, lastModified: obj.LastModified ? obj.LastModified.toISOString() : null });
            }
            await tx.done;
        }

        async function searchInCache(term) {
            const db = await initDB();
            const tx = db.transaction('objects', 'readonly');
            const store = tx.objectStore('objects');
            const all = await store.getAll();
            const lowerTerm = term.toLowerCase();
            return all.filter(obj => obj.key.toLowerCase().includes(lowerTerm));
        }

        async function getCacheStats() {
            const db = await initDB();
            const tx = db.transaction('objects', 'readonly');
            const store = tx.objectStore('objects');
            return await store.count();
        }

        async function getCachedFileSize(accountId, bucket, key) {
            const db = await initDB();
            const id = `${accountId}|${bucket}|${key}`;
            const obj = await db.get('objects', id);
            return obj ? obj.size : undefined;
        }

        // ===== 新增：计算当前账户已用容量（基于本地缓存，不消耗LIST） =====
        async function computeUsedBytesForCurrentAccount() {
            const acc = getCurrentAccount();
            if (!acc) return 0;
            const db = await initDB();
            const tx = db.transaction('objects', 'readonly');
            const store = tx.objectStore('objects');
            const index = store.index('byAccount');
            let cursor = await index.openCursor(IDBKeyRange.only(acc.id));
            let total = 0;
            while (cursor) {
                const obj = cursor.value;
                // 只统计属于当前bucket且非文件夹（不以'/'结尾）的文件大小
                if (obj.bucket === acc.bucket && !obj.key.endsWith('/') && typeof obj.size === 'number') {
                    total += obj.size;
                }
                cursor = await cursor.continue();
            }
            return total;
        }

        async function listAllFileKeys(s3, bucket, prefix) {
            let keys = []; let token;
            do { 
                const r = await s3.listObjectsV2({ Bucket: bucket, Prefix: prefix, ContinuationToken: token }).promise();
                if(r.Contents) keys.push(...r.Contents.filter(o=>!o.Key.endsWith('/')).map(o=>o.Key));
                token = r.NextContinuationToken;
            } while(token);
            return keys;
        }

        async function listAllFolderPrefixes(s3, bucket, prefix) {
            let prefixes = []; let token;
            do {
                const r = await s3.listObjectsV2({ Bucket: bucket, Prefix: prefix, Delimiter: '/', ContinuationToken: token }).promise();
                if (r.CommonPrefixes) {
                    const subFolders = r.CommonPrefixes.map(cp => cp.Prefix);
                    prefixes.push(...subFolders);
                    for (const sub of subFolders) {
                        const deeper = await listAllFolderPrefixes(s3, bucket, sub);
                        prefixes.push(...deeper);
                    }
                }
                token = r.NextContinuationToken;
            } while (token);
            return [...new Set(prefixes)];
        }

        // ---------- 核心修复：resolveContextTargets 严格尊重勾选状态，不再重复列举文件夹 ----------
        async function resolveContextTargets() {
            if(!contextItem) return [];
            const item = contextItem; 
            const acc = accounts.find(a=>a.id===item.accountId); 
            if(!acc) return [];
            const s3 = getS3ForAccount(acc); 
            let keys = [];
            
            // 如果右键条目本身处于勾选状态，则只处理当前勾选集合中的文件 (排除文件夹key)
            if(checkedKeys.has(item.compositeKey)) {
                // 收集所有属于同一账户/桶、且为文件(非文件夹)的勾选项
                for(const ck of checkedKeys) {
                    const [aid, buck, key] = ck.split('|');
                    if(aid !== acc.id || buck !== acc.bucket) continue;
                    if(key.endsWith('/')) continue; // 忽略文件夹前缀，只对文件操作
                    keys.push(key);
                }
            } else {
                // 未勾选状态：仅处理右键点击的条目本身 (文件夹则递归其下所有文件，文件则仅该文件)
                if(item.type === 'folder') {
                    keys = await listAllFileKeys(s3, acc.bucket, item.key);
                } else {
                    keys = [item.key];
                }
            }
            // 去重并返回
            return [...new Set(keys)].map(k => ({ account: acc, key: k }));
        }

        async function uploadWithConcurrency(files, basePrefix = '') {
            const acc = getCurrentAccount(); if(!acc) return;
            const s3 = getCurrentS3();
            const MAX_CONCURRENT = 5, RETRY_COUNT = 3;
            const MIN_PART_SIZE = 5*1024*1024, MAX_PART_SIZE = 100*1024*1024;
            const totalSize = files.reduce((sum, f) => sum + f.size, 0);
            let uploadedSize = 0, active = 0, index = 0, completed = 0;
            const total = files.length;
            showProgress(true, totalSize, 0, `准备上传 ${total} 个文件`);

            async function uploadFileWithRetry(file, key, retry = 0) {
                try {
                    let partSize = MIN_PART_SIZE;
                    if (file.size > 1024*1024*1024) partSize = MAX_PART_SIZE;
                    else if (file.size > 200*1024*1024) partSize = 50*1024*1024;
                    const uploadTask = s3.upload({ Bucket: acc.bucket, Key: key, Body: file }, { partSize, queueSize: 4, maxRetries: 5 });
                    uploadTask.on('httpUploadProgress', (evt) => {
                        const currentUploaded = uploadedSize + (evt.loaded || 0);
                        progressBar.value = currentUploaded;
                        progressText.innerText = `上传中：${file.name} (${formatSize(evt.loaded)}/${formatSize(evt.total)}) | 整体进度：${Math.round((currentUploaded/totalSize)*100)}%`;
                    });
                    await uploadTask.promise();
                    return true;
                } catch (err) {
                    try { await cleanCurrentMultipart(); } catch (cleanErr) {}
                    if (retry < RETRY_COUNT) {
                        setStatus(`⚠️ ${file.name} 上传失败，重试(${retry+1}/${RETRY_COUNT})...`);
                        await new Promise(resolve => setTimeout(resolve, 1000 * (retry + 1)));
                        return uploadFileWithRetry(file, key, retry + 1);
                    }
                    return false;
                }
            }

            return new Promise((resolve) => {
                async function processNext() {
                    if (index >= total) {
                        if (active === 0) {
                            showProgress(false);
                            refreshFileList();
                            setStatus(completed === total ? `✅ 上传完成 ${total}个文件` : `⚠️ 上传完成，${completed}成功，${total-completed}失败`);
                            afterUploadOrDelete();
                            resolve();
                        }
                        return;
                    }
                    const file = files[index++];
                    active++;
                    const key = basePrefix + (file.webkitRelativePath || file.name);
                    const success = await uploadFileWithRetry(file, key);
                    if (success) {
                        completed++;
                        uploadedSize += file.size;
                    }
                    active--;
                    processNext();
                }
                progressBar.max = totalSize;
                for (let i = 0; i < Math.min(MAX_CONCURRENT, total); i++) processNext();
            });
        }

        async function cleanCurrentMultipart() {
            const acc = getCurrentAccount(); if(!acc) return;
            const s3 = getCurrentS3();
            try {
                let uploads = [], marker;
                do {
                    const d = await s3.listMultipartUploads({ Bucket: acc.bucket, KeyMarker: marker }).promise();
                    uploads.push(...(d.Uploads || []));
                    marker = d.NextKeyMarker;
                } while (marker);
                for (const u of uploads) await s3.abortMultipartUpload({ Bucket: acc.bucket, Key: u.Key, UploadId: u.UploadId }).promise();
            } catch (e) { console.warn('清理分片失败', e); }
        }

        // ----- 增强预览/编辑 (Markdown格式全支持，代码块带标题/复制/行号) -----
        function getFileExtension(filename) { return filename.split('.').pop().toLowerCase(); }
        async function fetchFileContent(account, key) {
            const s3 = getS3ForAccount(account);
            const resp = await s3.getObject({ Bucket: account.bucket, Key: key }).promise();
            return { body: resp.Body, contentType: resp.ContentType };
        }
        function showModal(title) { modalTitle.innerText = title; previewEditModal.style.display = 'flex'; }
        function hideModal() { previewEditModal.style.display = 'none'; modalBody.innerHTML = ''; }
        closeModalBtn.onclick = hideModal;
        previewEditModal.addEventListener('click', (e) => { if(e.target === previewEditModal) hideModal(); });

        function renderMarkdownWithHighlights(markdownText) {
            const html = marked.parse(markdownText);
            const container = document.createElement('div');
            container.className = 'markdown-body';
            container.innerHTML = html;
            
            container.querySelectorAll('pre code').forEach(block => {
                let lang = 'text';
                for (let cls of block.classList) {
                    if (cls.startsWith('language-')) { lang = cls.replace('language-', ''); break; }
                }
                const code = block.textContent;
                const highlighted = hljs.highlight(code, { language: lang }).value;
                block.innerHTML = highlighted;
                block.classList.add('hljs');
                hljs.lineNumbersBlock(block);
                
                const pre = block.parentNode;
                const containerDiv = document.createElement('div');
                containerDiv.className = 'code-block-container';
                
                const header = document.createElement('div');
                header.className = 'code-block-header';
                const iconClass = getLanguageIcon(lang);
                header.innerHTML = `
                    <div class="code-language">
                        <i class="${iconClass}"></i>
                        <span class="lang-name">${lang}</span>
                    </div>
                    <div class="code-actions">
                        <button class="code-action-btn copy-code-btn"><i class="fas fa-copy"></i> 复制</button>
                    </div>
                `;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'code-content';
                contentDiv.appendChild(pre.cloneNode(true));
                containerDiv.appendChild(header);
                containerDiv.appendChild(contentDiv);
                pre.parentNode.replaceChild(containerDiv, pre);
            });
            
            container.querySelectorAll('.copy-code-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const codeBlock = btn.closest('.code-block-container');
                    const code = codeBlock.querySelector('code').textContent;
                    navigator.clipboard.writeText(code).then(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                        setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> 复制', 2000);
                    }).catch(() => {});
                });
            });
            return container;
        }

        async function previewFile(item) {
            const acc = accounts.find(a=>a.id===item.accountId); if(!acc) return;
            const ext = getFileExtension(item.name);
            showModal(`预览: ${item.name}`);
            modalBody.innerHTML = '<div style="padding:20px;text-align:center">加载中...</div>';
            try {
                const { body, contentType } = await fetchFileContent(acc, item.key);
                if (['png','jpg','jpeg','gif','webp'].includes(ext)) {
                    const blob = new Blob([body], {type: contentType});
                    const url = URL.createObjectURL(blob);
                    modalBody.innerHTML = `<div class="preview-container"><img src="${url}" style="max-width:100%; border-radius:20px;"></div>`;
                } else if (ext === 'pdf') {
                    const blob = new Blob([body], {type: 'application/pdf'});
                    const url = URL.createObjectURL(blob);
                    modalBody.innerHTML = `<iframe class="preview-frame" src="${url}"></iframe>`;
                } else if (ext === 'xlsx' || ext === 'xls') {
                    const wb = XLSX.read(body, {type:'array'});
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const html = XLSX.utils.sheet_to_html(sheet);
                    modalBody.innerHTML = `<div class="xlsx-table">${html}</div>`;
                } else if (ext === 'docx') {
                    const arrayBuffer = body.buffer ? body.buffer : new Uint8Array(body).buffer;
                    const result = await mammoth.convertToHtml({arrayBuffer});
                    modalBody.innerHTML = `<div style="background:white;padding:20px;border-radius:20px;">${result.value}</div>`;
                } else if (ext === 'md' || ext === 'markdown') {
                    const text = new TextDecoder().decode(body);
                    const rendered = renderMarkdownWithHighlights(text);
                    modalBody.innerHTML = '';
                    modalBody.appendChild(rendered);
                } else if (ext === 'txt') {
                    const text = new TextDecoder().decode(body);
                    modalBody.innerHTML = `<pre style="white-space:pre-wrap;background:white;padding:20px;border-radius:20px;">${escapeHtml(text)}</pre>`;
                } else {
                    modalBody.innerHTML = `<p>不支持预览此类型，可尝试编辑或下载。</p>`;
                }
            } catch(e) { modalBody.innerHTML = `<p style="color:red">预览失败: ${e.message}</p>`; }
        }

        async function editFile(item) {
            const acc = accounts.find(a=>a.id===item.accountId); if(!acc) return;
            const ext = getFileExtension(item.name);
            if (!['txt','md','docx'].includes(ext)) { alert('编辑仅支持 txt, md, docx (docx以纯文本编辑)'); return; }
            showModal(`编辑: ${item.name}`);
            modalBody.innerHTML = '<div>加载内容...</div>';
            try {
                const { body } = await fetchFileContent(acc, item.key);
                let text = '';
                if (ext === 'docx') {
                    const arrayBuffer = body.buffer ? body.buffer : new Uint8Array(body).buffer;
                    const result = await mammoth.extractRawText({arrayBuffer});
                    text = result.value;
                } else { text = new TextDecoder().decode(body); }
                const isMd = ext === 'md';
                modalBody.innerHTML = `
                    <div class="editor-toolbar">
                        <button id="saveEditBtn" class="btn-primary">💾 保存</button>
                        <button id="cancelEditBtn" class="btn-outline">取消</button>
                        ${isMd ? '<button id="toggleMdPreviewBtn" class="btn-outline">👁️ 预览</button>' : ''}
                    </div>
                    <textarea id="editTextarea" class="editor-textarea">${escapeHtml(text)}</textarea>
                    ${isMd ? '<div id="mdPreviewArea" class="markdown-body" style="display:none; margin-top:16px;"></div>' : ''}
                `;
                const textarea = document.getElementById('editTextarea');
                const saveBtn = document.getElementById('saveEditBtn');
                document.getElementById('cancelEditBtn').onclick = hideModal;
                if (isMd) {
                    const toggleBtn = document.getElementById('toggleMdPreviewBtn');
                    const previewArea = document.getElementById('mdPreviewArea');
                    toggleBtn.onclick = () => {
                        if (previewArea.style.display === 'none') {
                            const rendered = renderMarkdownWithHighlights(textarea.value);
                            previewArea.innerHTML = '';
                            previewArea.appendChild(rendered);
                            previewArea.style.display = 'block';
                        } else previewArea.style.display = 'none';
                    };
                }
                saveBtn.onclick = async () => {
                    const newContent = textarea.value;
                    const s3 = getS3ForAccount(acc);
                    try {
                        await s3.putObject({ Bucket: acc.bucket, Key: item.key, Body: newContent }).promise();
                        setStatus(`✅ 已保存 ${item.name}`);
                        hideModal();
                        afterUploadOrDelete();
                    } catch(e) { alert('保存失败: '+e.message); }
                };
            } catch(e) { modalBody.innerHTML = `<p style="color:red">加载失败: ${e.message}</p>`; }
        }

        // 初始化
        async function init() {
            await initDB();
            loadAccounts();
            renderAccountSelect();
            refreshCacheStatus();
            
            accountSelect.addEventListener('change', ()=>{
                currentAccountId = accountSelect.value;
                loadAccountToForm(currentAccountId);
                s3ClientCache.delete(currentAccountId);
                connectCurrentAccount();
            });
            connectAccountBtn.addEventListener('click', connectCurrentAccount);
            syncCacheBtn.addEventListener('click', syncAllCaches);
            
            document.getElementById('addAccountBtn').addEventListener('click', ()=>{
                const name = accountNameInput.value.trim() || `账户_${accounts.length+1}`;
                const acc = {
                    id: generateAccountId(), name,
                    accountId: accountIdInput.value.trim(), accessKey: accessKeyInput.value.trim(),
                    secretKey: secretKeyInput.value.trim(), bucket: bucketInput.value.trim(),
                    customDomain: customDomainInput.value.trim(), urlMode: urlModeSelect.value,
                    expiresIn: parseInt(expiresInInput.value,10)||3600
                };
                accounts.push(acc); saveAccounts(); renderAccountSelect(); currentAccountId = acc.id; accountSelect.value=acc.id; connectCurrentAccount();
            });
            document.getElementById('updateAccountBtn').addEventListener('click', ()=>{
                const acc = accounts.find(a=>a.id===currentAccountId); if(!acc) return;
                acc.name = accountNameInput.value.trim() || acc.name;
                acc.accountId = accountIdInput.value.trim(); acc.accessKey = accessKeyInput.value.trim();
                acc.secretKey = secretKeyInput.value.trim(); acc.bucket = bucketInput.value.trim();
                acc.customDomain = customDomainInput.value.trim(); acc.urlMode = urlModeSelect.value;
                acc.expiresIn = parseInt(expiresInInput.value,10)||3600;
                saveAccounts(); renderAccountSelect(); s3ClientCache.delete(currentAccountId); connectCurrentAccount();
            });
            document.getElementById('deleteAccountBtn').addEventListener('click', async ()=>{
                if(accounts.length<=1) { alert('至少保留一个账户'); return; }
                const id = currentAccountId;
                accounts = accounts.filter(a=>a.id!==id); saveAccounts();
                await clearCacheForAccount(id);
                currentAccountId = accounts[0].id; renderAccountSelect(); connectCurrentAccount();
                refreshCacheStatus();
            });
            
            toggleConfigBtn.addEventListener('click', ()=> configSection.classList.toggle('collapsed'));
            cleanMultipartBtn.addEventListener('click', cleanCurrentMultipart);
            
            upBtn.addEventListener('click', ()=>{ if(!isGlobalSearchMode) goParent(); });
            searchBtn.addEventListener('click', async ()=>{
                const term = searchInput.value.trim();
                if(term) await performCachedSearch(term);
                else clearSearch();
            });
            clearSearchBtn.addEventListener('click', clearSearch);
            
            selectAllBtn.addEventListener('click', ()=>{
                displayItems.forEach(it=>{ if(it.type==='file') checkedKeys.add(`${it.accountId}|${it.bucket}|${it.key}`); });
                renderFileList();
            });
            deselectAllBtn.addEventListener('click', ()=>{ checkedKeys.clear(); renderFileList(); });
            
            exportCsvBtn.addEventListener('click', async ()=>{
                if(checkedKeys.size===0) return alert('没有勾选项');
                const items = [];
                for(const ck of checkedKeys) {
                    const [aid, buck, key] = ck.split('|'); if(key.endsWith('/')) continue;
                    const acc = accounts.find(a=>a.id===aid); if(!acc) continue;
                    let size = await getCachedFileSize(aid, buck, key);
                    if(!size) { try{ const h=await getS3ForAccount(acc).headObject({Bucket:buck,Key:key}).promise(); size=h.ContentLength; }catch(e){} }
                    const url = await getUrlForItem(acc, key);
                    items.push({ accName:acc.name||buck, bucket:buck, name:key.split('/').pop(), url, sizeMB: ((size||0)/1048576).toFixed(2) });
                }
                const csv = ['账户,存储桶,文件名,URL,大小(MB)'].concat(items.map(i=>`"${i.accName}","${i.bucket}","${i.name}","${i.url||''}",${i.sizeMB}`)).join('\n');
                const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
                const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='export.csv'; a.click();
            });
            
            async function resolveCheckedTargets() {
                const res = [];
                for(const ck of checkedKeys) {
                    const [aid, buck, key] = ck.split('|'); if(key.endsWith('/')) continue;
                    const acc = accounts.find(a=>a.id===aid); if(acc) res.push({acc, key});
                }
                return res;
            }
            downloadSelectedBtn.addEventListener('click', async ()=>{
                const targets = await resolveCheckedTargets(); if(!targets.length) return;
                for(const t of targets) { const url = await getUrlForItem(t.acc, t.key); if(url) window.open(url, '_blank'); }
            });
            deleteSelectedBtn.addEventListener('click', async ()=>{
                const targets = await resolveCheckedTargets(); if(!targets.length) return;
                if(!confirm(`删除 ${targets.length} 个文件?`)) return;
                for(const t of targets) { await getS3ForAccount(t.acc).deleteObject({Bucket:t.acc.bucket,Key:t.key}).promise(); }
                checkedKeys.clear(); refreshFileList(); afterUploadOrDelete();
            });
            
            uploadFileBtn.addEventListener('click', () => hiddenFileInput.click());
            uploadFolderBtn.addEventListener('click', () => hiddenFolderInput.click());
            hiddenFileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                await uploadWithConcurrency(files, currentPrefix);
                hiddenFileInput.value = '';
            });
            hiddenFolderInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                await uploadWithConcurrency(files, currentPrefix);
                hiddenFolderInput.value = '';
            });
            
            copyUrlCtxBtn.addEventListener('click', async ()=>{
                const targets = await resolveContextTargets(); 
                const urls = await Promise.all(targets.map(t=>getUrlForItem(t.account, t.key)));
                await navigator.clipboard.writeText(urls.join('\n')); 
                setStatus(`已复制 ${urls.length} 个URL`); 
                hideContextMenu();
            });
            downloadCtxBtn.addEventListener('click', async ()=>{
                const targets = await resolveContextTargets(); 
                for(const t of targets) { const url=await getUrlForItem(t.account, t.key); if(url) window.open(url,'_blank'); }
                hideContextMenu();
            });
            deleteCtxBtn.addEventListener('click', async ()=>{
                const targets = await resolveContextTargets(); if(!targets.length) return;
                if(!confirm(`删除 ${targets.length} 个文件?`)) return;
                for(const t of targets) await getS3ForAccount(t.account).deleteObject({Bucket:t.account.bucket,Key:t.key}).promise();
                refreshFileList(); hideContextMenu(); afterUploadOrDelete();
            });
            previewCtxBtn.addEventListener('click', ()=>{
                if(!contextItem || contextItem.type==='folder') { alert('请右键点击文件'); hideContextMenu(); return; }
                previewFile(contextItem);
                hideContextMenu();
            });
            editCtxBtn.addEventListener('click', ()=>{
                if(!contextItem || contextItem.type==='folder') { alert('请右键点击文件'); hideContextMenu(); return; }
                editFile(contextItem);
                hideContextMenu();
            });
            
            document.addEventListener('click', hideContextMenu);
            setTimeout(()=>{ if(currentAccountId) connectCurrentAccount(); }, 100);
        }
        init();
    })();
</script>
