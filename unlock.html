<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件密钥解锁 · 核心页面</title>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .lock-box {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .lock-box h2 {
            margin-bottom: 10px;
            color: #333;
        }
        .lock-box input {
            margin: 20px 0;
            padding: 10px;
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 28px;
        }
        .lock-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
        }
        .tip {
            margin-top: 20px;
            font-size: 14px;
            color: #e53e3e;
        }
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

</div>

    const IV = CryptoJS.enc.Hex.parse("c3d8aecc3efc5ca1d1dee4965fdc808f");
    const TARGET_FILE_HASH = "d071708d06ef4858fd6807ac498fae195531c21cf2bded2022ca958e4aac5916";

    async function getFileHash(file) {
        const arrayBuffer = await file.arrayBuffer();
        const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('unlockBtn').onclick = async () => {
        const fileInput = document.getElementById('keyFileInput');
        const tipDiv = document.getElementById('tip');
        if (!fileInput.files[0]) {
            tipDiv.textContent = "请选择密钥文件！";
            return;
        }
        try {
            const fileHash = await getFileHash(fileInput.files[0]);
            if (fileHash !== TARGET_FILE_HASH) {
                tipDiv.textContent = "❌ 密钥文件错误，验证失败！";
                return;
            }
            const fileContent = await fileInput.files[0].text();
            const KEY = CryptoJS.enc.Hex.parse(fileContent.trim());
            const decrypted = CryptoJS.AES.decrypt(CIPHER_TEXT, KEY, {
                iv: IV,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            const result = decrypted.toString(CryptoJS.enc.Utf8);
            if (!result) throw new Error("解密失败");
            document.open();
            document.write(result);
            document.close();
        } catch(e) {
            tipDiv.textContent = "❌ 解密失败，文件无效或损坏";
            console.error(e);
        }
    };
